<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Iniciar sesión - INNOVAX Laser Control</title>
  <style>
    :root {
      /* Paleta alineada al sistema principal (azul/morado/verde) */
      --bg: #0b1020;
      --panel: rgba(14, 20, 36, 0.92);
      --panel-2: rgba(10, 15, 28, 0.92);
      --accent: #3498db;
      --accent-glow: rgba(52, 152, 219, 0.42);
      --accent-dark: #2980b9;
      --success: #34d399;
      --success-glow: rgba(52, 211, 153, 0.35);
      --purple: #533483;

      /* Branding (para glow del logo INNOVAX, sin dominar el tema) */
      --brand: #f59e0b;
      --brand-glow: rgba(245, 158, 11, 0.45);
      --text: #f8fafc;
      --muted: #94a3b8;
      --input-bg: rgba(15, 23, 42, 0.7);
      --border: rgba(52, 152, 219, 0.18);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI Variable", "Segoe UI", system-ui, -apple-system, Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: geometricPrecision;
      overflow: hidden;
    }

    /* Scanlines MUY sutiles (no competir con el UI principal) */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 4;
      pointer-events: none;
      background:
        repeating-linear-gradient(
          180deg,
          rgba(255,255,255,0.00) 0px,
          rgba(255,255,255,0.00) 2px,
          rgba(255,255,255,0.012) 3px
        ),
        radial-gradient(ellipse 60% 40% at 50% 10%, rgba(83, 52, 131, 0.05), transparent 58%),
        radial-gradient(ellipse 55% 45% at 0% 90%, rgba(52, 211, 153, 0.04), transparent 58%);
      mix-blend-mode: overlay;
      opacity: 0.28;
      animation: scanDrift 14s linear infinite;
    }

    @keyframes scanDrift {
      0% { transform: translateY(0); }
      100% { transform: translateY(24px); }
    }

    /* Fondo animado futurista */
    .bg-container {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: 
        radial-gradient(ellipse 80% 50% at 40% -20%, rgba(52, 152, 219, 0.12), transparent),
        radial-gradient(ellipse 60% 40% at 110% 100%, rgba(83, 52, 131, 0.12), transparent),
        radial-gradient(ellipse 40% 60% at 0% 80%, rgba(52, 211, 153, 0.07), transparent),
        linear-gradient(135deg, #0f3460 0%, #16213e 55%, #533483 100%);
    }

    .bg-container::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 55% 45% at 70% 18%, rgba(52, 152, 219, 0.10), transparent 62%),
        radial-gradient(ellipse 50% 55% at 20% 75%, rgba(52, 211, 153, 0.08), transparent 62%);
      animation: bgPulse 7.5s ease-in-out infinite;
      opacity: 0.85;
      mix-blend-mode: screen;
      pointer-events: none;
    }

    @keyframes bgPulse {
      0%, 100% { opacity: 0.55; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.02); }
    }

    /* Lineas de energia horizontales */
    .energy-lines {
      position: fixed;
      inset: 0;
      z-index: 1;
      overflow: hidden;
      pointer-events: none;
    }

    /* Barrido extra tipo HUD */
    .energy-lines::before {
      content: "";
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        90deg,
        rgba(52, 152, 219, 0.00) 0px,
        rgba(52, 152, 219, 0.00) 56px,
        rgba(52, 152, 219, 0.028) 57px,
        rgba(52, 152, 219, 0.00) 60px
      );
      opacity: 0.55;
      animation: hudSlide 10s linear infinite;
      mix-blend-mode: screen;
    }

    @keyframes hudSlide {
      0% { transform: translateX(-40px); }
      100% { transform: translateX(40px); }
    }
    .energy-line {
      position: absolute;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0;
      animation: scanLine 4s ease-in-out infinite;
    }
    .energy-line:nth-child(1) { top: 20%; animation-delay: 0s; }
    .energy-line:nth-child(2) { top: 40%; animation-delay: 1.3s; }
    .energy-line:nth-child(3) { top: 60%; animation-delay: 2.6s; }
    .energy-line:nth-child(4) { top: 80%; animation-delay: 0.8s; }
    
    @keyframes scanLine {
      0% { left: -100%; width: 100%; opacity: 0; }
      10% { opacity: 0.6; }
      90% { opacity: 0.6; }
      100% { left: 100%; width: 100%; opacity: 0; }
    }

    /* Cuadricula hexagonal sutil */
    .hex-grid {
      position: fixed;
      inset: 0;
      z-index: 2;
      background-image: 
        linear-gradient(rgba(52, 152, 219, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(52, 152, 219, 0.035) 1px, transparent 1px);
      background-size: 40px 40px;
      -webkit-mask-image: radial-gradient(ellipse 70% 70% at center, black, transparent);
      mask-image: radial-gradient(ellipse 70% 70% at center, black, transparent);
      pointer-events: none;
    }

    /* Un segundo grid diagonal (más cyberpunk) */
    .hex-grid::after {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(135deg, rgba(83, 52, 131, 0.028) 1px, transparent 1px),
        linear-gradient(45deg, rgba(52, 211, 153, 0.02) 1px, transparent 1px);
      background-size: 60px 60px;
      opacity: 0.7;
      mix-blend-mode: screen;
    }

    /* Particulas flotantes */
    .particles {
      position: fixed;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      overflow: hidden;
    }
    .particle {
      position: absolute;
      width: 3px;
      height: 3px;
      background: var(--success);
      border-radius: 50%;
      box-shadow: 0 0 10px var(--success-glow);
      animation: floatUp 6s ease-in-out infinite;
      opacity: 0;
    }
    .particle:nth-child(1) { left: 10%; animation-delay: 0s; }
    .particle:nth-child(2) { left: 25%; animation-delay: 1s; }
    .particle:nth-child(3) { left: 45%; animation-delay: 2s; }
    .particle:nth-child(4) { left: 65%; animation-delay: 0.5s; }
    .particle:nth-child(5) { left: 85%; animation-delay: 1.5s; }
    .particle:nth-child(6) { left: 90%; animation-delay: 3s; }
    
    @keyframes floatUp {
      0% { bottom: -10%; opacity: 0; transform: scale(0.5); }
      20% { opacity: 0.8; }
      80% { opacity: 0.8; }
      100% { bottom: 110%; opacity: 0; transform: scale(1); }
    }

    /* Tarjeta principal */
    .card {
      position: relative;
      z-index: 10;
      width: min(440px, 92vw);
      background: linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
      -webkit-backdrop-filter: blur(20px);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: 
        0 0 0 1px rgba(52, 152, 219, 0.12),
        0 25px 80px rgba(0, 0, 0, 0.7),
        0 0 90px rgba(83, 52, 131, 0.14),
        0 0 90px rgba(52, 211, 153, 0.08),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
      padding: 40px;
      animation: cardGlow 3s ease-in-out infinite alternate;
    }

    /* Borde neon premium (sin imágenes) */
    .card::before {
      content: "";
      position: absolute;
      inset: -1px;
      border-radius: 24px;
      padding: 1px;
      background: linear-gradient(
        135deg,
        rgba(52, 152, 219, 0.55),
        rgba(83, 52, 131, 0.35),
        rgba(52, 211, 153, 0.25)
      );
      -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
      mask-composite: exclude;
      opacity: 0.6;
      pointer-events: none;
      animation: borderShift 6s linear infinite;
    }

    .card::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 24px;
      background:
        radial-gradient(120% 80% at 50% 0%, rgba(52, 152, 219, 0.10), transparent 58%),
        radial-gradient(90% 70% at 100% 100%, rgba(83, 52, 131, 0.08), transparent 62%);
      pointer-events: none;
      opacity: 0.9;
    }

    @keyframes borderShift {
      0% { filter: hue-rotate(0deg); opacity: 0.45; }
      50% { filter: hue-rotate(6deg); opacity: 0.7; }
      100% { filter: hue-rotate(0deg); opacity: 0.45; }
    }
    
    @keyframes cardGlow {
      0% { box-shadow: 0 0 0 1px rgba(52, 152, 219, 0.12), 0 25px 80px rgba(0, 0, 0, 0.7), 0 0 60px rgba(83, 52, 131, 0.10), 0 0 40px rgba(52, 211, 153, 0.06); }
      100% { box-shadow: 0 0 0 1px rgba(52, 152, 219, 0.20), 0 25px 80px rgba(0, 0, 0, 0.7), 0 0 95px rgba(83, 52, 131, 0.16), 0 0 70px rgba(52, 211, 153, 0.10); }
    }

    /* Subtitulo bajo logo */
    .system-name {
      text-align: center;
      margin-bottom: 32px;
      padding-bottom: 24px;
      border-bottom: 1px solid rgba(52, 211, 153, 0.18);
    }
    
    @keyframes textGlow {
      0%, 100% {
        text-shadow: 0 0 10px rgba(52, 211, 153, 0.22), 0 0 24px rgba(52, 152, 219, 0.18);
      }
      50% {
        text-shadow: 0 0 18px rgba(52, 211, 153, 0.30), 0 0 36px rgba(52, 152, 219, 0.28), 0 0 60px rgba(83, 52, 131, 0.22);
      }
    }
    
    .system-name h2 {
      font-size: 15px;
      font-weight: 800;
      color: #ffffff;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 6px;
      animation: textGlow 3s ease-in-out infinite;
    }
    
    .system-name span {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 1px;
    }

    /* Titulo */
    h1 {
      font-size: 30px;
      font-weight: 800;
      margin-bottom: 8px;
      color: #fff;
      text-align: center;
      letter-spacing: 0.2px;
    }

    /* Titulo con efecto "laser" (con fallback) */
    @supports (-webkit-background-clip: text) {
      h1 {
        background: linear-gradient(90deg, #ffffff 0%, rgba(52, 152, 219, 0.95) 34%, rgba(52, 211, 153, 0.9) 56%, #ffffff 78%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        text-shadow: 0 0 24px rgba(52, 152, 219, 0.10);
        animation: titleSheen 5.5s ease-in-out infinite;
        background-size: 180% 100%;
      }
    }

    @keyframes titleSheen {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    
    .subtitle {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 32px;
      text-align: center;
      line-height: 1.5;
      letter-spacing: 0.2px;
    }

    /* Inputs */
    .input-group { margin-bottom: 20px; }
    
    .input-group label {
      display: block;
      margin-bottom: 8px;
      color: rgba(226, 232, 240, 0.92);
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 0.9px;
      text-transform: uppercase;
    }

    .input-group label::after {
      content: "";
      display: block;
      width: 26px;
      height: 2px;
      margin-top: 6px;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(52, 211, 153, 0.85), transparent);
      opacity: 0.65;
    }
    
    .input-wrapper {
      position: relative;
    }

    /* Laser-scan en inputs al focus */
    .input-wrapper::after {
      content: "";
      position: absolute;
      left: 12px;
      right: 12px;
      top: 10px;
      height: 2px;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, rgba(52, 211, 153, 0.85), rgba(52, 152, 219, 0.75), transparent);
      opacity: 0;
      transform: translateY(8px);
      pointer-events: none;
    }

    .input-wrapper:focus-within::after {
      opacity: 0.85;
      animation: inputScan 1.35s ease-in-out infinite;
    }

    @keyframes inputScan {
      0% { transform: translateY(8px) scaleX(0.7); filter: blur(0.2px); }
      50% { transform: translateY(30px) scaleX(1); filter: blur(0px); }
      100% { transform: translateY(52px) scaleX(0.7); filter: blur(0.2px); }
    }
    
    .input-wrapper svg {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      stroke: var(--muted);
      stroke-width: 2;
      fill: none;
      pointer-events: none;
      transition: all 0.3s ease;
    }
    
    .input-wrapper input {
      width: 100%;
      padding: 16px 16px 16px 48px;
      border-radius: 12px;
      border: 1.5px solid rgba(148, 163, 184, 0.15);
      background: var(--input-bg);
      color: var(--text);
      font-size: 15px;
      outline: none;
      transition: all 0.3s ease;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,0.15);
      caret-color: var(--accent);
    }
    
    .input-wrapper input::placeholder { color: #4b5563; }
    
    .input-wrapper input:hover {
      border-color: rgba(52, 152, 219, 0.35);
      box-shadow: inset 0 0 0 1px rgba(52, 152, 219, 0.08), 0 0 0 3px rgba(52, 152, 219, 0.05);
    }
    
    .input-wrapper input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.16), 0 0 22px rgba(52, 152, 219, 0.12);
    }

    .input-wrapper input:focus-visible {
      border-color: rgba(52, 211, 153, 0.85);
      box-shadow: 0 0 0 3px rgba(52, 211, 153, 0.14), 0 0 30px rgba(52, 152, 219, 0.12);
    }
    
    .input-wrapper input:focus + svg {
      stroke: var(--accent);
      filter: drop-shadow(0 0 4px var(--accent-glow));
    }

    /* Boton */
    button[type="submit"] {
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 16px 24px;
      margin-top: 12px;
      background: linear-gradient(135deg, #3498db 0%, #533483 55%, #1f6aa0 100%);
      background-size: 200% 100%;
      color: #ffffff;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 6px 22px rgba(83, 52, 131, 0.25), 0 0 26px rgba(52, 152, 219, 0.18);
      position: relative;
      overflow: hidden;
      text-transform: uppercase;
    }

    button[type="submit"]::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, transparent, rgba(52, 211, 153, 0.14), rgba(52, 152, 219, 0.12), transparent);
      transform: translateX(-120%);
      mix-blend-mode: screen;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    @keyframes buttonPulse {
      0%, 100% { box-shadow: 0 8px 26px rgba(83, 52, 131, 0.22), 0 0 26px rgba(52, 152, 219, 0.16); }
      50% { box-shadow: 0 12px 40px rgba(83, 52, 131, 0.35), 0 0 38px rgba(52, 211, 153, 0.16); }
    }
    
    button[type="submit"]::before {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: left 0.5s ease;
    }
    
    button[type="submit"]:hover {
      background-position: 100% 0;
      box-shadow: 0 10px 40px rgba(83, 52, 131, 0.40), 0 0 44px rgba(52, 211, 153, 0.14);
      transform: translateY(-2px);
      animation: buttonPulse 1.8s ease-in-out infinite;
    }

    button[type="submit"]:hover::after {
      opacity: 1;
      animation: btnSweep 1.1s ease-in-out infinite;
    }

    @keyframes btnSweep {
      0% { transform: translateX(-120%); }
      100% { transform: translateX(120%); }
    }
    
    button[type="submit"]:hover::before {
      left: 100%;
    }
    
    button[type="submit"]:active {
      transform: translateY(0);
      animation: none;
    }

    button[type="submit"]:focus-visible {
      outline: none;
      box-shadow: 0 0 0 3px rgba(52, 211, 153, 0.18), 0 12px 40px rgba(52, 152, 219, 0.20);
    }
    
    button[type="submit"]:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    /* Error */
    .error {
      display: none;
      margin-top: 20px;
      padding: 14px 16px;
      border-radius: 10px;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #fca5a5;
      font-weight: 600;
      font-size: 13px;
      text-align: center;
    }

    /* Hint */
    .hint {
      font-size: 11px;
      color: var(--muted);
      margin-top: 24px;
      text-align: center;
      line-height: 1.7;
    }
    
    .hint code {
      background: rgba(245, 158, 11, 0.15);
      color: var(--accent);
      padding: 2px 8px;
      border-radius: 4px;
      font-family: Consolas, monospace;
      font-size: 10px;
    }

    /* Footer */
    .footer {
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      text-align: center;
    }

    .footer-brand {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .footer-logo {
      height: 18px;
      width: auto;
      display: block;
      filter:
        drop-shadow(0 0 10px rgba(245, 158, 11, 0.35))
        drop-shadow(0 0 12px rgba(52, 152, 219, 0.18));
      opacity: 0.95;
    }
    
    .footer span {
      font-size: 10px;
      color: #64748b;
      letter-spacing: 1px;
    }
    
    .footer .version {
      display: inline-block;
      background: rgba(245, 158, 11, 0.1);
      color: var(--accent);
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 9px;
      margin-left: 8px;
    }

    /* Accesibilidad: reduce animaciones si el usuario lo prefiere */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.001ms !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  <!-- Efectos de fondo -->
  <div class="bg-container"></div>
  <div class="energy-lines">
    <div class="energy-line"></div>
    <div class="energy-line"></div>
    <div class="energy-line"></div>
    <div class="energy-line"></div>
  </div>
  <div class="hex-grid"></div>
  <div class="particles">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
  </div>

  <div class="card">
    <!-- Nombre del sistema -->
    <div class="system-name">
      <h2>LASER CONTROL</h2>
      <span>Sistema de Grabado Industrial</span>
    </div>

    <!-- Titulo -->
    <h1>Iniciar sesión</h1>
    <p id="login-subtitle" class="subtitle">Ingresa tu usuario y contrasena para acceder</p>

    <!-- Formulario -->
    <form id="login-form">
      <div class="input-group">
        <label for="username">Usuario</label>
        <div class="input-wrapper">
          <input id="username" name="username" placeholder="Ingresa tu usuario" autocomplete="username" required />
          <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </div>
      </div>

      <div id="password-group" class="input-group">
        <label for="password">Contrasena</label>
        <div class="input-wrapper">
          <input id="password" name="password" type="password" placeholder="Ingresa tu contrasena" autocomplete="current-password" required />
          <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
            <rect x="5" y="11" width="14" height="10" rx="2" ry="2"/>
            <path d="M8 11V8a4 4 0 1 1 8 0v3"/>
          </svg>
        </div>
      </div>
      
      <button id="submit-btn" type="submit">ACCEDER AL SISTEMA</button>
      
      <div id="error" class="error"></div>
      
      <p class="hint">Problemas para acceder? Contacta al administrador o revisa <code>server.env</code> y <code>server-credentials.txt</code></p>
    </form>
    
    <div class="footer">
      <div class="footer-brand">
        <img class="footer-logo" src="/innovax-logo.png" alt="INNOVAX" />
        <span>INNOVAX GRUPO INDUSTRIAL</span>
        <span class="version">v2.0</span>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById("login-form");
    const btn = document.getElementById("submit-btn");
    const err = document.getElementById("error");
    const subtitle = document.getElementById("login-subtitle");
    const passwordGroup = document.getElementById("password-group");
    const passwordInput = document.getElementById("password");
    let requirePassword = true;
    
    function showError(msg) {
      err.textContent = msg;
      err.style.display = "block";
    }

    function applyLoginMode() {
      if (requirePassword) {
        subtitle.textContent = "Ingresa tu usuario y contrasena para acceder";
        passwordGroup.style.display = "";
        passwordInput.required = true;
        passwordInput.disabled = false;
      } else {
        subtitle.textContent = "Ingresa solo tu usuario para acceder";
        passwordGroup.style.display = "none";
        passwordInput.required = false;
        passwordInput.disabled = true;
        passwordInput.value = "";
      }
    }

    async function loadLoginMode() {
      try {
        const resp = await fetch("/healthz", {
          headers: { Accept: "application/json" }
        });
        if (!resp.ok) return;
        const data = await resp.json().catch(() => null);
        if (!data || !data.auth) return;
        requirePassword = data.auth.requirePassword !== false;
      } catch (e) {
        // Mantener modo seguro por defecto.
      } finally {
        applyLoginMode();
      }
    }

    loadLoginMode();
    
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      err.style.display = "none";
      btn.disabled = true;
      btn.textContent = "VERIFICANDO...";
      
      try {
        const username = document.getElementById("username").value;
        const password = requirePassword ? document.getElementById("password").value : "";
        
        const resp = await fetch("/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password })
        });
        
        if (!resp.ok) {
          const data = await resp.json().catch(() => ({}));
          const serverMsg = data && data.error ? data.error : "";
          if (resp.status === 400 && serverMsg.toLowerCase().includes("auth disabled")) {
            throw new Error("Login deshabilitado. Activa AUTH_ENABLED=true");
          }
          if (resp.status === 401) {
            throw new Error(requirePassword ? "Usuario o contrasena incorrectos" : "Usuario incorrecto");
          }
          throw new Error(serverMsg || "Error HTTP " + resp.status);
        }
        
        btn.textContent = "ACCESO CONCEDIDO";
        btn.style.background = "linear-gradient(135deg, #22c55e, #16a34a)";
        
        setTimeout(() => {
          window.location.href = "/";
        }, 500);
        
      } catch (e2) {
        showError(e2 && e2.message ? e2.message : "Error de login");
        btn.textContent = "ACCEDER AL SISTEMA";
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
